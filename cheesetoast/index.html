<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cheese Toast — Digital Portrait</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0a0a0c;
    overflow: hidden;
    touch-action: none;
    font-family: -apple-system, "SF Pro Display", "Pretendard", "Helvetica Neue", Arial, sans-serif;
  }
  #stage { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }
  .hud {
    position: absolute; left: 0; right: 0; bottom: 6%;
    pointer-events: none; text-align: center; z-index: 2;
  }
  .caption {
    font-size: 13px; font-weight: 300; letter-spacing: 0.03em;
    color: rgba(225, 220, 215, 0.45);
  }
  .fade-in { animation: fadeIn 1.8s ease forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="hud fade-in" style="animation-delay:.8s">
    <div class="caption">눌러서 당겨보세요</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR, isMobile;
let scale = 1, originX = 0, originY = 0;
let t = 0;
let pieces = [];
let motes = [];
let sand = [];

function rand(a, b) { return a + Math.random() * (b - a); }
function makeCanvas(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
function angDiff(a, b) { let d = (a - b) % (Math.PI * 2); if (d > Math.PI) d -= Math.PI * 2; if (d < -Math.PI) d += Math.PI * 2; return d; }

const pointer = { x: -9999, y: -9999, down: false, active: false };

function resize() {
  isMobile = window.innerWidth < 640 || /Mobi|Android|iPhone/i.test(navigator.userAgent);
  DPR = Math.min(window.devicePixelRatio || 1, isMobile ? 1.5 : 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layout();
}

const design = { w: 460, h: 380 };
const layoutDef = [
  { cx: 150, cy: 96, rx: 62, ry: 44, rot: -8 },
  { cx: 272, cy: 78, rx: 58, ry: 42, rot: 7 },
  { cx: 88, cy: 198, rx: 66, ry: 48, rot: -13 },
  { cx: 236, cy: 192, rx: 64, ry: 47, rot: 9 },
  { cx: 142, cy: 300, rx: 62, ry: 45, rot: -6 },
  { cx: 270, cy: 308, rx: 60, ry: 44, rot: 11 },
  { cx: 380, cy: 210, rx: 56, ry: 50, rot: -10 }
];

const N = 26; // perimeter points per piece
const SHARPNESS = 7; // how narrow the pulled lobe is
const MAX_STRETCH = 130; // design-space px of stretch before it releases

let grain;
function buildGrain() {
  grain = makeCanvas(180, 180);
  const g = grain.getContext('2d');
  const img = g.createImageData(180, 180);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 128 + rand(-30, 30);
    img.data[i] = v; img.data[i + 1] = v; img.data[i + 2] = v; img.data[i + 3] = 22;
  }
  g.putImageData(img, 0, 0);
}

function shapeR(piece, angle) {
  const h = piece.harm;
  return 1 + h.a1 * Math.sin(2 * angle + h.p1) + h.a2 * Math.sin(3 * angle + h.p2) + h.a3 * Math.sin(5 * angle + h.p3);
}

function layout() {
  const s = Math.min(W / (design.w * 1.3), H / (design.h * 1.35));
  scale = s * (isMobile ? 1.1 : 1);
  originX = W / 2 - (design.w * scale) / 2;
  originY = H / 2 - (design.h * scale) / 2 + H * 0.02;

  if (pieces.length === 0) {
    if (!grain) buildGrain();
    pieces = layoutDef.map(d => {
      const harm = {
        a1: rand(0.04, 0.08), p1: rand(0, Math.PI * 2),
        a2: rand(0.03, 0.06), p2: rand(0, Math.PI * 2),
        a3: rand(0.02, 0.04), p3: rand(0, Math.PI * 2)
      };
      const piece = {
        cx: d.cx, cy: d.cy, rx: d.rx, ry: d.ry, rot: d.rot * Math.PI / 180,
        phase: Math.random() * Math.PI * 2,
        harm,
        hue: rand(-8, 8),
        points: [],
        pulled: false,
        pressStart: 0, pressX: 0, pressY: 0,
        pokeT: -999, pokeX: 0, pokeY: 0
      };
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2;
        piece.points.push({ restAngle: a, x: 0, y: 0, vx: 0, vy: 0 });
      }
      return piece;
    });
    pieces.sort((a, b) => a.cy - b.cy);
  }
}

function restLocal(piece, angle) {
  const r = shapeR(piece, angle);
  return { x: Math.cos(angle) * piece.rx * r, y: Math.sin(angle) * piece.ry * r };
}

function worldOf(piece, lx, ly) {
  const cos = Math.cos(piece._rotNow), sin = Math.sin(piece._rotNow);
  return {
    x: piece._wx + (lx * cos - ly * sin) * scale,
    y: piece._wy + (lx * sin + ly * cos) * scale
  };
}

function pointInPolygon(pts, x, y) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i].x, yi = pts[i].y, xj = pts[j].x, yj = pts[j].y;
    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function updatePiece(piece) {
  const bobY = Math.sin(t * 0.014 + piece.phase) * 9;
  const bobX = Math.cos(t * 0.011 + piece.phase * 1.3) * 5;
  const bobRot = Math.sin(t * 0.009 + piece.phase * 0.7) * 0.035;
  piece._wx = originX + piece.cx * scale + bobX;
  piece._wy = originY + piece.cy * scale + bobY;
  piece._rotNow = piece.rot + bobRot;

  let localPointerAngle = null, pointerLocalDist = 0;
  if (piece.pulled) {
    const cos = Math.cos(-piece._rotNow), sin = Math.sin(-piece._rotNow);
    const dx = (pointer.x - piece._wx) / scale, dy = (pointer.y - piece._wy) / scale;
    const lx = dx * cos - dy * sin, ly = dx * sin + dy * cos;
    localPointerAngle = Math.atan2(ly, lx);
    pointerLocalDist = Math.hypot(lx, ly);
  }

  let maxInfluence = 0;
  for (const p of piece.points) {
    const rest = restLocal(piece, p.restAngle);
    const restW = worldOf(piece, rest.x, rest.y);

    let targetX = restW.x, targetY = restW.y;
    let influence = 0;
    if (piece.pulled && localPointerAngle !== null) {
      const d = angDiff(p.restAngle, localPointerAngle);
      influence = Math.pow(Math.max(0, Math.cos(d)), SHARPNESS);
      targetX = restW.x + (pointer.x - restW.x) * influence;
      targetY = restW.y + (pointer.y - restW.y) * influence;
    }
    maxInfluence = Math.max(maxInfluence, influence);

    // poke ripple: brief outward-then-spring impulse based on distance/time since poke
    if (t - piece.pokeT < 26) {
      const dx = restW.x - piece.pokeX, dy = restW.y - piece.pokeY;
      const dist = Math.hypot(dx, dy) + 0.001;
      const age = (t - piece.pokeT) / 26;
      const wave = Math.sin(age * Math.PI) * Math.max(0, 1 - dist / (90 * scale));
      targetX += (dx / dist) * wave * 6;
      targetY += (dy / dist) * wave * 6;
    }

    const k = 0.05 + influence * 0.16;
    const damp = 0.74;
    p.vx = (p.vx + (targetX - p.x) * k) * damp;
    p.vy = (p.vy + (targetY - p.y) * k + influence * 0.35) * damp;

    if (p.x === 0 && p.y === 0) { p.x = restW.x; p.y = restW.y; }
    p.x += p.vx; p.y += p.vy;

    // ambient sand trickle: occasionally shed a fine grain from lower-facing points
    if (Math.sin(p.restAngle) > 0.55 && Math.random() < 0.006) {
      sand.push({
        x: p.x + rand(-2, 2), y: p.y,
        vx: rand(-0.15, 0.15), vy: rand(0.15, 0.35),
        life: 1, size: rand(0.6, 1.4)
      });
    }
  }
  return maxInfluence;
}

function drawPiece(piece) {
  const pts = piece.points;

  // shadow — scales/fades with float height for a stronger floating illusion
  const floatLift = Math.max(0, (originY + piece.cy * scale) - piece._wy);
  const shrink = Math.max(0.55, 1 - floatLift / (140 * scale));
  ctx.save();
  const shR = piece.rx * scale;
  ctx.beginPath();
  ctx.ellipse(piece._wx, originY + piece.cy * scale + piece.ry * scale * 0.62, shR * 0.82 * shrink, shR * 0.28 * shrink, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,${0.38 * shrink})`;
  ctx.filter = 'blur(6px)';
  ctx.fill();
  ctx.filter = 'none';
  ctx.restore();

  // find tip (most extended point) for gradient direction
  let tip = pts[0], tipDist = 0;
  for (const p of pts) {
    const d = Math.hypot(p.x - piece._wx, p.y - piece._wy);
    if (d > tipDist) { tipDist = d; tip = p; }
  }

  // build smooth closed path through points (quadratic through midpoints)
  ctx.beginPath();
  const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
  let m0 = mid(pts[pts.length - 1], pts[0]);
  ctx.moveTo(m0.x, m0.y);
  for (let i = 0; i < pts.length; i++) {
    const next = pts[(i + 1) % pts.length];
    const m = mid(pts[i], next);
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, m.x, m.y);
  }
  ctx.closePath();

  const grad = ctx.createLinearGradient(piece._wx, piece._wy, tip.x, tip.y);
  grad.addColorStop(0, `hsl(${34 + piece.hue}, 42%, 30%)`);
  grad.addColorStop(0.55, `hsl(${38 + piece.hue}, 55%, 46%)`);
  grad.addColorStop(1, `hsl(${42 + piece.hue}, 70%, 68%)`);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.save();
  ctx.clip();
  // soft volumetric shading
  const vol = ctx.createRadialGradient(piece._wx - shR * 0.3, piece._wy - shR * 0.35, shR * 0.1, piece._wx, piece._wy, shR * 1.4);
  vol.addColorStop(0, 'rgba(255,244,220,0.22)');
  vol.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = vol;
  ctx.fillRect(piece._wx - shR * 2, piece._wy - shR * 2, shR * 4, shR * 4);
  // grain
  ctx.globalAlpha = 0.5;
  ctx.drawImage(grain, piece._wx - shR * 1.6, piece._wy - shR * 1.6, shR * 3.2, shR * 3.2);
  ctx.globalAlpha = 1;
  ctx.restore();

  // cool rim light along one edge for a contemporary sculptural contrast
  ctx.save();
  ctx.clip();
  ctx.strokeStyle = 'rgba(150,190,230,0.28)';
  ctx.lineWidth = Math.max(1.5, shR * 0.045);
  ctx.beginPath();
  let mm0 = mid(pts[pts.length - 1], pts[0]);
  ctx.moveTo(mm0.x, mm0.y);
  for (let i = 0; i < pts.length; i++) {
    const next = pts[(i + 1) % pts.length];
    const m = mid(pts[i], next);
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, m.x, m.y);
  }
  ctx.stroke();
  ctx.restore();
}

function spawnMotes(x, y, n, warm) {
  for (let i = 0; i < n; i++) {
    motes.push({
      x: x + rand(-4, 4), y: y + rand(-4, 4),
      vx: rand(-0.5, 0.5), vy: rand(-0.9, -0.1),
      life: 1, size: rand(0.8, 2.2), warm: !!warm
    });
  }
}

function draw() {
  t += 1;
  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(W / 2, H * 0.4, H * 0.05, W / 2, H * 0.55, H * 0.8);
  bg.addColorStop(0, '#1c1a1c');
  bg.addColorStop(1, '#08080a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  for (const piece of pieces) {
    const infl = updatePiece(piece);
    if (piece.pulled) {
      const stretchDist = Math.hypot(pointer.x - piece._wx, pointer.y - piece._wy) / scale;
      if (stretchDist > MAX_STRETCH) {
        const tipX = pointer.x, tipY = pointer.y;
        piece.pulled = false;
        spawnMotes(tipX, tipY, 8, true);
      }
    }
  }

  for (const piece of pieces) drawPiece(piece);

  for (let i = motes.length - 1; i >= 0; i--) {
    const m = motes[i];
    m.vy += 0.02; m.x += m.vx; m.y += m.vy; m.life -= 0.014;
    if (m.life <= 0) { motes.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.fillStyle = m.warm ? `rgba(240,205,150,${m.life * 0.8})` : `rgba(190,205,220,${m.life * 0.6})`;
    ctx.shadowColor = m.warm ? 'rgba(240,205,150,0.8)' : 'rgba(190,205,220,0.6)';
    ctx.shadowBlur = 4;
    ctx.arc(m.x, m.y, m.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  if (sand.length > 260) sand.splice(0, sand.length - 260);
  for (let i = sand.length - 1; i >= 0; i--) {
    const s = sand[i];
    s.vy += 0.015; s.x += s.vx; s.y += s.vy; s.life -= 0.008;
    if (s.life <= 0) { sand.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.fillStyle = `rgba(210,175,120,${s.life * 0.55})`;
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

function setPointer(x, y) {
  const rect = canvas.getBoundingClientRect();
  pointer.x = x - rect.left;
  pointer.y = y - rect.top;
}

function onDown(x, y) {
  setPointer(x, y);
  pointer.active = true; pointer.down = true;
  for (let i = pieces.length - 1; i >= 0; i--) {
    const piece = pieces[i];
    if (pointInPolygon(piece.points, pointer.x, pointer.y)) {
      piece.pulled = true;
      piece._active = true;
      piece.pressStart = t;
      piece.pressX = pointer.x; piece.pressY = pointer.y;
      break;
    }
  }
}
function onMove(x, y) {
  if (!pointer.down) return;
  setPointer(x, y);
}
function onUp() {
  pointer.down = false; pointer.active = false;
  for (const piece of pieces) {
    if (!piece._active) continue;
    piece._active = false;
    if (piece.pulled) {
      const dist = Math.hypot(pointer.x - piece._wx, pointer.y - piece._wy) / scale;
      const heldShort = t - piece.pressStart < 12 && dist < 6;
      piece.pulled = false;
      if (heldShort) {
        piece.pokeT = t; piece.pokeX = piece.pressX; piece.pokeY = piece.pressY;
        spawnMotes(piece.pressX, piece.pressY, 5, false);
      }
    }
  }
  pointer.x = -9999; pointer.y = -9999;
}

let lastTouchActivity = -9999;
canvas.addEventListener('mousemove', e => { if (t - lastTouchActivity < 90) return; onMove(e.clientX, e.clientY); });
canvas.addEventListener('mousedown', e => { if (t - lastTouchActivity < 90) return; onDown(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { if (t - lastTouchActivity < 90) return; onUp(); });

let activeTouchId = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  lastTouchActivity = t;
  if (activeTouchId !== null) return;
  const touch = e.changedTouches[0];
  activeTouchId = touch.identifier;
  onDown(touch.clientX, touch.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  lastTouchActivity = t;
  for (const touch of e.changedTouches) {
    if (touch.identifier === activeTouchId) { onMove(touch.clientX, touch.clientY); break; }
  }
}, { passive: false });
function endTouch(e) {
  e.preventDefault();
  lastTouchActivity = t;
  for (const touch of e.changedTouches) {
    if (touch.identifier === activeTouchId) { activeTouchId = null; onUp(); break; }
  }
}
canvas.addEventListener('touchend', endTouch, { passive: false });
canvas.addEventListener('touchcancel', endTouch, { passive: false });

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
