<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Truffle — Digital Portrait</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0d0806;
    overflow: hidden;
    touch-action: none;
    font-family: -apple-system, "SF Pro Display", "Pretendard", "Helvetica Neue", Arial, sans-serif;
  }
  #stage { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }
  .hud {
    position: absolute; left: 0; right: 0; bottom: 6%;
    pointer-events: none; text-align: center; z-index: 2;
  }
  .caption {
    font-size: 13px; font-weight: 300; letter-spacing: 0.03em;
    color: rgba(230, 220, 205, 0.5);
  }
  .fade-in { animation: fadeIn 1.8s ease forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="hud fade-in" style="animation-delay:.8s">
    <div class="caption">문질러서 속을 확인해보세요</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR, isMobile;
let scale = 1, originX = 0, originY = 0;
let t = 0;
let truffles = [];
let dust = [];

const OFF = 200;
const OFF_R = OFF / 2;
const MG = 44; // mask grid resolution per truffle

const pointer = { x: -9999, y: -9999, down: false, active: false };

function rand(a, b) { return a + Math.random() * (b - a); }

function resize() {
  isMobile = window.innerWidth < 640 || /Mobi|Android|iPhone/i.test(navigator.userAgent);
  DPR = Math.min(window.devicePixelRatio || 1, isMobile ? 1.5 : 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layout();
}

const design = { w: 340, h: 300 };
const layoutDef = [
  { x: 48, y: 58, r: 38 },
  { x: 138, y: 44, r: 42 },
  { x: 228, y: 56, r: 39 },
  { x: 306, y: 80, r: 35 },
  { x: 82, y: 128, r: 47 },
  { x: 176, y: 112, r: 51 },
  { x: 264, y: 132, r: 46 },
  { x: 98, y: 216, r: 58 },
  { x: 200, y: 226, r: 61, cut: true },
  { x: 296, y: 202, r: 53, cut: true }
];

function buildBlobShape() {
  const n = 8;
  const pinch = Math.random() < 0.5 ? Math.floor(Math.random() * n) : -1;
  const mult = [];
  for (let i = 0; i < n; i++) {
    let m = rand(0.88, 1.0);
    if (i === pinch) m = rand(0.72, 0.8);
    mult.push(m);
  }
  return { mult, squash: rand(0.86, 0.93) };
}

// approximate the blob's radius in a given direction by interpolating
// between its control points (same angular basis as blobPath)
function blobRadiusAt(shape, angleFromCenter) {
  const n = shape.mult.length;
  let a = angleFromCenter + Math.PI / 2;
  a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const f = (a / (Math.PI * 2)) * n;
  const i0 = Math.floor(f) % n;
  const i1 = (i0 + 1) % n;
  const frac = f - Math.floor(f);
  return shape.mult[i0] * (1 - frac) + shape.mult[i1] * frac;
}

function layout() {
  const s = Math.min(W / (design.w * 1.5), H / (design.h * 1.6));
  scale = s * (isMobile ? 1.15 : 1);
  originX = W / 2 - (design.w * scale) / 2;
  originY = H / 2 - (design.h * scale) / 2 + H * 0.02;

  if (truffles.length === 0) {
    truffles = layoutDef.map((d) => {
      const tex = buildTexture();
      const erased = new Float32Array(MG * MG);
      if (d.cut) {
        for (let gy = 0; gy < MG; gy++) {
          for (let gx = 0; gx < MG; gx++) {
            const ux = (gx / MG) * 2 - 1, uy = (gy / MG) * 2 - 1;
            const ang = Math.atan2(uy, ux);
            if (ang > -1.15 && ang < -0.1 && Math.hypot(ux, uy) < 1.05) {
              erased[gy * MG + gx] = 1;
            }
          }
        }
      }
      return {
        dx: d.x, dy: d.y, r: d.r,
        pistachio: tex.pistachio, cocoa: tex.cocoa,
        shape: buildBlobShape(),
        phase: Math.random() * Math.PI * 2,
        erased,
        lastTouch: 0,
        squishAmt: 0,
        squishV: 0
      };
    });
    truffles.sort((a, b) => a.dy - b.dy);
  }
}

function buildTexture() {
  const pistachio = document.createElement('canvas');
  pistachio.width = OFF; pistachio.height = OFF;
  const pctx = pistachio.getContext('2d');
  const g = pctx.createRadialGradient(OFF_R, OFF_R, 4, OFF_R, OFF_R, OFF_R);
  g.addColorStop(0, '#9fae5a');
  g.addColorStop(0.55, '#8a9a4d');
  g.addColorStop(1, '#6d7a3a');
  pctx.fillStyle = g;
  pctx.beginPath(); pctx.arc(OFF_R, OFF_R, OFF_R, 0, Math.PI * 2); pctx.fill();
  for (let i = 0; i < 140; i++) {
    const a = Math.random() * Math.PI * 2;
    const rad = Math.random() * OFF_R * 0.94;
    const x = OFF_R + Math.cos(a) * rad;
    const y = OFF_R + Math.sin(a) * rad;
    const shade = Math.random();
    pctx.fillStyle = shade < 0.33 ? 'rgba(190,205,120,0.5)' : shade < 0.66 ? 'rgba(120,100,40,0.35)' : 'rgba(230,220,150,0.4)';
    pctx.beginPath();
    pctx.ellipse(x, y, rand(2, 6), rand(1.5, 4), Math.random() * Math.PI, 0, Math.PI * 2);
    pctx.fill();
  }
  pctx.strokeStyle = 'rgba(59,38,25,0.9)';
  pctx.lineWidth = OFF * 0.05;
  pctx.beginPath();
  pctx.arc(OFF_R, OFF_R, OFF_R - pctx.lineWidth / 2, 0, Math.PI * 2);
  pctx.stroke();

  const cocoa = document.createElement('canvas');
  cocoa.width = OFF; cocoa.height = OFF;
  const cctx = cocoa.getContext('2d');
  const cg = cctx.createRadialGradient(OFF_R * 0.8, OFF_R * 0.75, OFF_R * 0.1, OFF_R, OFF_R, OFF_R * 1.05);
  cg.addColorStop(0, '#5b3e2c');
  cg.addColorStop(0.6, '#3d2818');
  cg.addColorStop(1, '#241408');
  cctx.fillStyle = cg;
  cctx.beginPath(); cctx.arc(OFF_R, OFF_R, OFF_R, 0, Math.PI * 2); cctx.fill();
  for (let i = 0; i < 500; i++) {
    const a = Math.random() * Math.PI * 2;
    const rad = Math.random() * OFF_R * 0.98;
    const x = OFF_R + Math.cos(a) * rad;
    const y = OFF_R + Math.sin(a) * rad;
    const shade = Math.random();
    cctx.fillStyle = shade < 0.5 ? 'rgba(80,55,38,0.5)' : 'rgba(20,10,4,0.4)';
    cctx.beginPath();
    cctx.arc(x, y, rand(0.6, 1.8), 0, Math.PI * 2);
    cctx.fill();
  }
  cctx.globalCompositeOperation = 'screen';
  const hl = cctx.createRadialGradient(OFF_R * 0.62, OFF_R * 0.55, 2, OFF_R * 0.62, OFF_R * 0.55, OFF_R * 0.7);
  hl.addColorStop(0, 'rgba(150,110,80,0.35)');
  hl.addColorStop(1, 'rgba(150,110,80,0)');
  cctx.fillStyle = hl;
  cctx.beginPath(); cctx.arc(OFF_R, OFF_R, OFF_R, 0, Math.PI * 2); cctx.fill();
  cctx.globalCompositeOperation = 'multiply';
  const sh = cctx.createRadialGradient(OFF_R * 1.15, OFF_R * 1.2, 4, OFF_R * 1.15, OFF_R * 1.2, OFF_R * 1.1);
  sh.addColorStop(0, 'rgba(0,0,0,0.55)');
  sh.addColorStop(1, 'rgba(0,0,0,0)');
  cctx.fillStyle = sh;
  cctx.beginPath(); cctx.arc(OFF_R, OFF_R, OFF_R, 0, Math.PI * 2); cctx.fill();
  cctx.globalCompositeOperation = 'source-over';

  return { pistachio, cocoa };
}

function blobPath(pctx, cx, cy, rPix, shape, squishAmt) {
  squishAmt = squishAmt || 0;
  const xScale = 1 + squishAmt * 0.08;
  const squashEff = Math.max(0.6, shape.squash - squishAmt * 0.12);
  const n = shape.mult.length;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const rr = rPix * shape.mult[i];
    pts.push({ x: cx + Math.cos(a) * rr * xScale, y: cy + Math.sin(a) * rr * squashEff + rPix * (1 - squashEff) * 0.3 });
  }
  pctx.beginPath();
  const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
  let m0 = mid(pts[n - 1], pts[0]);
  pctx.moveTo(m0.x, m0.y);
  for (let i = 0; i < n; i++) {
    const next = pts[(i + 1) % n];
    const m = mid(pts[i], next);
    pctx.quadraticCurveTo(pts[i].x, pts[i].y, m.x, m.y);
  }
  pctx.closePath();
}

const scratchMask = document.createElement('canvas');
scratchMask.width = MG; scratchMask.height = MG;
const scratchMaskCtx = scratchMask.getContext('2d');
const scratchTex = document.createElement('canvas');
scratchTex.width = OFF; scratchTex.height = OFF;
const scratchTexCtx = scratchTex.getContext('2d');

function eraseAt(truffle, lx, ly) {
  const gx = (lx / OFF) * MG, gy = (ly / OFF) * MG;
  const gr = (30 / OFF) * MG;
  const gr2 = gr * gr;
  const rimStart = 0.52; // normalized radius where the resistant skin begins (applies equally in every direction)
  const rimMinOpacity = 0.05; // cocoa can barely be erased near the very edge
  const x0 = Math.max(0, Math.floor(gx - gr)), x1 = Math.min(MG - 1, Math.ceil(gx + gr));
  const y0 = Math.max(0, Math.floor(gy - gr)), y1 = Math.min(MG - 1, Math.ceil(gy + gr));
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const dx = x - gx, dy = y - gy;
      const d2 = dx * dx + dy * dy;
      if (d2 > gr2) continue;
      const falloff = 1 - Math.sqrt(d2) / gr;
      const idx = y * MG + x;

      const ux = (x / MG) * 2 - 1, uy = (y / MG) * 2 - 1;
      const nd = Math.hypot(ux, uy);
      let maxAllowed = 1;
      if (nd > rimStart) {
        const k = Math.min(1, (nd - rimStart) / (1 - rimStart));
        maxAllowed = 1 - k * (1 - rimMinOpacity);
      }

      const next = truffle.erased[idx] + falloff * 0.3;
      truffle.erased[idx] = Math.min(maxAllowed, next);
    }
  }
  truffle.lastTouch = t;
}

function healAll(truffle) {
  if (t - truffle.lastTouch < 45) return;
  const arr = truffle.erased;
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] > 0) arr[i] = Math.max(0, arr[i] - 0.006);
  }
}

function renderMaskedCocoa(truffle) {
  const imgData = scratchMaskCtx.createImageData(MG, MG);
  const arr = truffle.erased;
  for (let i = 0; i < arr.length; i++) {
    const alpha = (1 - arr[i]) * 255;
    imgData.data[i * 4] = 255;
    imgData.data[i * 4 + 1] = 255;
    imgData.data[i * 4 + 2] = 255;
    imgData.data[i * 4 + 3] = alpha;
  }
  scratchMaskCtx.putImageData(imgData, 0, 0);

  scratchTexCtx.clearRect(0, 0, OFF, OFF);
  scratchTexCtx.globalCompositeOperation = 'source-over';
  scratchTexCtx.drawImage(truffle.cocoa, 0, 0);
  scratchTexCtx.globalCompositeOperation = 'destination-in';
  scratchTexCtx.imageSmoothingEnabled = true;
  scratchTexCtx.drawImage(scratchMask, 0, 0, MG, MG, 0, 0, OFF, OFF);
  scratchTexCtx.globalCompositeOperation = 'source-over';
  return scratchTex;
}

function spawnDust(x, y) {
  if (dust.length > 90) return;
  for (let i = 0; i < 2; i++) {
    dust.push({ x, y, vx: rand(-0.6, 0.6), vy: rand(-1.2, -0.2), life: 1, size: rand(1, 2.6) });
  }
}

function draw() {
  t += 1;
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(W / 2, H * 0.42, H * 0.1, W / 2, H * 0.55, H * 0.75);
  bg.addColorStop(0, '#1b120c');
  bg.addColorStop(1, '#0a0605');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // pick the truffle the touch point is proportionally closest to (dist/own-radius),
  // not just z-order — this stops a large overlapping neighbor from stealing touches
  // meant for a smaller truffle sitting in front of it
  let activeTruffle = null;
  if (pointer.active && pointer.down) {
    let bestRatio = Infinity;
    for (let i = 0; i < truffles.length; i++) {
      const tr = truffles[i];
      const bounce = Math.sin(t * 0.02 + tr.phase) * 0.012;
      const rPix = tr.r * scale * (1 + bounce);
      const drawX = originX + tr.dx * scale;
      const drawY = originY + tr.dy * scale;
      const dxp = pointer.x - drawX, dyp = pointer.y - drawY;
      const dist = Math.hypot(dxp, dyp);
      const angle = Math.atan2(dyp, dxp);
      const shapeR = rPix * blobRadiusAt(tr.shape, angle) * tr.shape.squash;
      const ratio = dist / shapeR;
      if (ratio < 0.9 && ratio < bestRatio) { bestRatio = ratio; activeTruffle = tr; }
    }
  }

  for (const tr of truffles) {
    const bounce = Math.sin(t * 0.02 + tr.phase) * 0.012;
    const rPix = tr.r * scale * (1 + bounce);
    const drawX = originX + tr.dx * scale;
    const drawY = originY + tr.dy * scale;

    ctx.beginPath();
    ctx.ellipse(drawX, drawY + rPix * 0.82, rPix * 0.9, rPix * 0.28, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.filter = 'blur(4px)';
    ctx.fill();
    ctx.filter = 'none';

    // jelly squish spring: gently pulls back to rest, kicked while being touched
    tr.squishV += (0 - tr.squishAmt) * 0.025;
    tr.squishV *= 0.86;
    tr.squishAmt += tr.squishV;

    if (tr === activeTruffle) {
      tr.squishV += 0.02;
      const dx = pointer.x - drawX, dy = pointer.y - drawY;
      const lx = OFF_R + (dx / rPix) * OFF_R;
      const ly = OFF_R + (dy / rPix) * OFF_R;
      eraseAt(tr, lx, ly);
      spawnDust(pointer.x, pointer.y);
    }
    healAll(tr);

    let revealed = 0;
    for (let i = 0; i < tr.erased.length; i++) revealed += tr.erased[i];
    revealed /= tr.erased.length;
    if (revealed > 0.12) {
      const glowA = Math.min(0.32, revealed * 0.4);
      ctx.beginPath();
      ctx.arc(drawX, drawY, rPix * 1.08, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(190,210,120,${glowA})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    const maskedCocoa = renderMaskedCocoa(tr);

    ctx.save();
    blobPath(ctx, drawX, drawY, rPix, tr.shape, tr.squishAmt);
    ctx.clip();
    ctx.drawImage(tr.pistachio, drawX - rPix, drawY - rPix, rPix * 2, rPix * 2);
    ctx.drawImage(maskedCocoa, drawX - rPix, drawY - rPix, rPix * 2, rPix * 2);
    ctx.restore();
  }

  for (let i = dust.length - 1; i >= 0; i--) {
    const d = dust[i];
    d.vy += 0.03;
    d.x += d.vx; d.y += d.vy;
    d.life -= 0.02;
    if (d.life <= 0) { dust.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.fillStyle = `rgba(70,45,28,${d.life * 0.7})`;
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

function setPointer(x, y) {
  const rect = canvas.getBoundingClientRect();
  pointer.x = x - rect.left;
  pointer.y = y - rect.top;
}

window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', e => { pointer.active = true; setPointer(e.clientX, e.clientY); });
canvas.addEventListener('mouseleave', () => { pointer.active = false; pointer.down = false; });
canvas.addEventListener('mousedown', e => { pointer.down = true; pointer.active = true; setPointer(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { pointer.down = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  pointer.active = true; pointer.down = true;
  const touch = e.touches[0];
  setPointer(touch.clientX, touch.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  setPointer(touch.clientX, touch.clientY);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  pointer.down = false; pointer.active = false;
  pointer.x = -9999; pointer.y = -9999;
}, { passive: false });

resize();
draw();
</script>
</body>
</html>
